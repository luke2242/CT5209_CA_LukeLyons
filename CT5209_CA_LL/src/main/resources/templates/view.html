<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Petition</title>
</head>
<body>

<nav>
    <a href="/">Home</a> |
    <a href="/showAll">View All Petitions</a> |
    <a href="/create">Create a Petition</a> |
    <a href="/search">Search Petitions</a>
</nav>

<h1 th:text="${petition.title}">Petition Title</h1>
<p th:text="${petition.description}">Description</p>

<h2>Signatures</h2>
<ul>
    <li th:each="sig : ${petition.signatures}">
        <span th:text="${sig.name}"></span> - <span th:text="${sig.email}"></span>
    </li>
</ul>

<h2>Sign this Petition</h2>
<form th:action="@{'/petition/' + ${petition.id} + '/sign'}" method="post">
    Name: <input type="text" name="name" required><br>
    Email: <input type="email" name="email" required><br>
    <input type="submit" value="Sign">
</form>

</body>
</html>
