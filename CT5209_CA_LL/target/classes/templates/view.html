<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>View Petition</title>
</head>
<body>

<nav>
    <a href="/">Home</a> |
    <a href="/showAll">View All Petitions</a> |
    <a href="/create">Create a Petition</a> |
    <a href="/search">Search Petitions</a>
</nav>

<h1 th:text="${petition.title}"></h1>

<p th:text="${petition.description}"></p>

<h2>Signatures</h2>
<ul>
    <th:block th:each="s : ${petition.signatures}">
        <li>
            <span th:text="${s.name}"></span> -
            <span th:text="${s.email}"></span>
        </li>
    </th:block>
</ul>

<h2>Sign this Petition</h2>

<form th:action="@{'/petition/' + ${petition.id} + '/sign'}" method="post">
    Name: <input type="text" name="name"><br><br>
    Email: <input type="email" name="email"><br><br>
    <button type="submit">Sign Petition</button>
</form>

</body>
</html>
